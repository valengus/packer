- name: search for Windows updates 
  win_updates:
    state: searched
  register: update_search_result

- name: show updates to install
  debug:
    msg: "{{ update_search_result }}"

- name: pre reboot, if needed
  win_reboot:
    pre_reboot_delay: 300
    reboot_timeout: 6000
  when: update_search_result.reboot_required

- name: Install Windows Updates
  win_updates:
    category_names: 
      - Application
      - Connectors
      - CriticalUpdates
      - DefinitionUpdates
      - DeveloperKits
      - FeaturePacks
      - Guidance
      - SecurityUpdates
      - ServicePacks
      - Tools
      - UpdateRollups
      - Updates
    reject_list:
    - KB5007406
  register: update_result

- name: show update_result
  debug:
    msg: "{{ update_result }}"

- name: reboot, if needed
  win_reboot:
    pre_reboot_delay: 300
    reboot_timeout: 6000
  when: update_result.reboot_required

- name: wait for system to become reachable over WinRM
  wait_for_connection:
    delay: 60
    sleep: 15
    timeout: 900

